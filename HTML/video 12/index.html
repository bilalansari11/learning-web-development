<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
</head>

<body>
    <h1>Media PLayer</h1>
    <section>
        <h2>Audios</h2>
        <audio src="assets/audios/audio1.mp3" controls muted></audio> <br />
        <audio src="assets/audios/audio2.mp3" controls muted></audio> <br />
        <audio src="assets/audios/audio3.mp3" controls muted></audio> <br />
        <audio src="assets/audios/audio4.mp3" controls muted></audio>
    </section>
    <section>
        <h2>Videos</h2>
        <video src="assets/videos/video2.mp4" controls height="300" width="500" muted></video> <br />
        <video src="assets/videos/video3.mp4" controls height="300" width="500" muted></video> <br />
        <video src="assets/videos/video4.mp4" controls height="300" width="500" muted></video> 
    </section>
</body>

</html>
