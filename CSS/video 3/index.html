<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        /* div {
            background-color: red;
        } */

        /* Class Selector */
        .red {
            background-color: red;
        }

        /* ID Selector */
        #green {
            background-color: green;
        }

        /* Child Selector */
        div > p {
            color: white;
            background-color: black;
        }

        /* Descendant Selector */
        div p {
            background-color: blue;
        }

        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selectors  */

        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color:red;
        }

        a:hover {
            background-color: brown;
        }

        p:first-child {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <mai class="one">
        <p>I am first</p>
        <p>I am second</p>
    </mai>
    <div class="red">
        I am a div
        <p>I am para inside a div</p>
    </div>

    <div id="green">
        I am an other div
        <article>
            <p>I am inside article </p>
        </article>
    </div>
    <a href="https://www.google.com">Go to Google</a>
    <a href="https://www.facebook.com">Go to Facebook</a>
</body>

</html>
