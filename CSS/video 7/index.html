<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity</title>
    <style>
        h1 {
            color: green;
        }

        .yellow {
            color: yellow;
        }

        .cpurple {
            color: purple;
        }

        .cred {
            color: red;
        }

        /* Attribute selector */
        [data-x=a] {
            color: bisque;
        }

        .para {
            color: aquamarine;
        }

        #para1 {
            color: cadetblue;
        }

        p {
            color: chartreuse !important;
        }
    </style>
</head>

<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
        <p style="color:brown" class="para" id="para1">Hatt be</p>
    </div>
</body>

</html>
